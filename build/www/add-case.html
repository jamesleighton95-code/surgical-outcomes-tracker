<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Case - Surgical Outcomes Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <h1>Surgical Outcomes Tracker</h1>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="cases.html">Cases</a>
                <a href="analytics.html">Analytics</a>
                <a href="query.html">Custom Query</a>
                <span id="userGreeting"></span>
                <a href="#" onclick="appConfig.logout()">Logout</a>
            </div>
        </nav>

        <main>
            <h2>Add New Case</h2>

            <form id="addCaseForm" class="case-form">
                <div class="form-section">
                    <h3>Procedure Information</h3>

                    <div class="form-group">
                        <label for="procedureType">Procedure Type *</label>
                        <select id="procedureType" name="procedureType" required>
                            <option value="">Select procedure type</option>
                            <option value="Open">Open</option>
                            <option value="Laparoscopic">Laparoscopic</option>
                            <option value="Robotic">Robotic</option>
                            <option value="Endoscopic">Endoscopic</option>
                            <option value="Percutaneous">Percutaneous</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="procedureName">Procedure Name *</label>
                        <input type="text" id="procedureName" name="procedureName"
                               placeholder="e.g., Laparoscopic Cholecystectomy" required>
                    </div>

                    <div class="form-group">
                        <label for="datePerformed">Date Performed *</label>
                        <input type="date" id="datePerformed" name="datePerformed" required>
                    </div>

                    <div class="form-group">
                        <label for="durationMinutes">Duration (minutes)</label>
                        <input type="number" id="durationMinutes" name="durationMinutes"
                               placeholder="90" min="0">
                    </div>
                </div>

                <div class="form-section">
                    <h3>Patient Demographics (No Identifiable Information)</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="patientAge">Age</label>
                            <input type="number" id="patientAge" name="patientAge"
                                   placeholder="45" min="0" max="120">
                        </div>

                        <div class="form-group">
                            <label for="patientSex">Sex</label>
                            <select id="patientSex" name="patientSex">
                                <option value="">Select</option>
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="asaGrade">ASA Grade</label>
                            <select id="asaGrade" name="asaGrade">
                                <option value="">Select</option>
                                <option value="1">ASA I</option>
                                <option value="2">ASA II</option>
                                <option value="3">ASA III</option>
                                <option value="4">ASA IV</option>
                                <option value="5">ASA V</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Outcomes</h3>

                    <div class="form-group">
                        <label for="outcome">Overall Outcome</label>
                        <select id="outcome" name="outcome">
                            <option value="">Select</option>
                            <option value="positive">Positive</option>
                            <option value="neutral">Neutral</option>
                            <option value="negative">Negative</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="complications">Complications</label>
                        <input type="text" id="complications" name="complications"
                               placeholder="e.g., none, minor bleeding, wound infection">
                    </div>
                </div>

                <div class="form-section">
                    <h3>Additional Notes</h3>

                    <div class="form-group">
                        <label for="notes">Clinical Notes (No Patient Identifiable Information)</label>
                        <textarea id="notes" name="notes" rows="5"
                                  placeholder="Any relevant clinical notes, technical challenges, or learning points..."></textarea>
                        <small>Do not include patient names, NHS numbers, or any identifiable information</small>
                    </div>
                </div>

                <div id="error" class="error"></div>
                <div id="success" class="success"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Case</button>
                    <a href="cases.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </main>
    </div>

    <script src="config.js"></script>
    <script>
        // Check authentication
        if (!appConfig.isAuthenticated()) {
            window.location.href = '/login.html';
        }

        // Display user greeting
        const user = appConfig.getCurrentUser();
        if (user) {
            document.getElementById('userGreeting').textContent = `Hello, ${user.name}`;
        }

        // Set max date to today
        document.getElementById('datePerformed').max = new Date().toISOString().split('T')[0];

        // Handle form submission
        document.getElementById('addCaseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            errorDiv.textContent = '';
            successDiv.textContent = '';

            // Collect form data
            const formData = {
                procedureType: document.getElementById('procedureType').value,
                procedureName: document.getElementById('procedureName').value,
                datePerformed: document.getElementById('datePerformed').value,
                durationMinutes: document.getElementById('durationMinutes').value || null,
                patientAge: document.getElementById('patientAge').value || null,
                patientSex: document.getElementById('patientSex').value || null,
                asaGrade: document.getElementById('asaGrade').value || null,
                outcome: document.getElementById('outcome').value || null,
                complications: document.getElementById('complications').value || null,
                notes: document.getElementById('notes').value || null
            };

            try {
                const response = await appConfig.apiCall('cases', {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = 'Case saved successfully!';

                    // Redirect to cases page after 1 second
                    setTimeout(() => {
                        window.location.href = '/cases.html';
                    }, 1000);
                } else {
                    errorDiv.textContent = data.error || 'Failed to save case';
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please try again.';
                console.error('Save case error:', error);
            }
        });
    </script>
</body>
</html>
